<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lion King – Asset Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --dark:#121212;
  --muted:#aaaaaa;
  --border:#e6e6e6;
  --shadow:0 18px 35px rgba(0,0,0,.06);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--dark);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:0 22px 76px;
}

/* HEADER */
.profile-header{
  text-align:center;
  padding:56px 0 40px;
}
.profile-img{
  width:128px;
  height:128px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:var(--shadow);
  border:4px solid #fff;
}
h1{
  margin-top:18px;
  font-family:'Playfair Display',serif;
  font-size:2.4rem;
  line-height:1.1;
}
.subtitle{
  margin-top:6px;
  font-size:.65rem;
  letter-spacing:6px;
  color:var(--muted);
}

/* CTA */
.cta-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:56px;
}
.btn-premium{
  display:flex;
  align-items:center;
  padding:18px 22px;
  border-radius:14px;
  font-size:.95rem;
  font-weight:600;
  text-decoration:none;
  transition:.25s ease;
}
.btn-premium svg{
  width:22px;
  height:22px;
  margin-right:16px;
  flex-shrink:0;
  opacity:.9;
}
.btn-dark{background:#121212;color:#fff}
.btn-light{background:#fff;color:#121212;border:1px solid var(--border)}
.btn-wa{background:#fff;color:#25d366;border:1px solid var(--border)}
.btn-premium:active{transform:scale(.97)}

/* SECTION */
.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.45rem;
  margin-bottom:22px;
}


/* FOOTER */
footer{
  padding-top:70px;
  text-align:center;
  font-size:.6rem;
  letter-spacing:4px;
  color:#c7c7c7;
}
.creator{
  margin-top:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  opacity:.6;
}
.creator img{
  height:12px;
}
.creator span{
  font-size:.55rem;
  letter-spacing:.5px;
}
</style>
</head>

<body>
<div class="container">

<header class="profile-header">
  <img src="https://res.cloudinary.com/dzxhnvu4a/image/upload/v1768383054/IMG-20260114-WA0020_efqs1m.jpg" class="profile-img" alt="Lion King">
  <h1>Lion King</h1>
  <p class="subtitle">ASSET MANAGEMENT</p>
</header>

<div class="cta-group">

<a href="tel:+6287776366677" class="btn-premium btn-dark">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6z"/>
    <path d="M9.5 12.5l2 2 4-4"/>
  </svg>
  Add Business Contact
</a>

<a href="https://wa.me/c/6287776366677" class="btn-premium btn-light">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="4" y="6" width="6" height="12" rx="1"/>
    <rect x="10" y="9" width="6" height="9" rx="1"/>
    <rect x="16" y="4" width="4" height="14" rx="1"/>
  </svg>
  View Catalog Detail
</a>

<a href="https://wa.me/+6287776366677?text=Ask%20for%20consulting" class="btn-premium btn-wa">
  <svg viewBox="0 0 24 24" fill="none" stroke="#25d366" stroke-width="1.6">
    <circle cx="7.5" cy="12" r="3"/>
    <path d="M10.5 12h10"/>
    <path d="M17 12v2"/>
    <path d="M19 12v2"/>
  </svg>
  Consult on WhatsApp
</a>

</div>


<h2 class="section-title">Commmunities for Opportunities</h2>



<footer>
  &copy LION KING ASSET MANAGEMENT
  <div>
    <img src="https://res.cloudinary.com/dzxhnvu4a/image/upload/v1768383044/IMG-20260114-WA0021_diuypl.jpg" alt="" style="width:20px; height:20px; border-radius:50%; margin-top:5px;">
  </div>
</footer>

</div>
</body>
</html>
